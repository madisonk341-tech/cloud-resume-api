<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Madison Kennedy Resume</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f9f9f9;
      color: #222;
    }

    h1 {
      margin-bottom: 5px;
    }

    .section {
      margin-top: 30px;
    }

    .item {
      margin-bottom: 15px;
    }

    .title {
      font-weight: bold;
    }

    .muted {
      color: #666;
      font-size: 14px;
    }

    .skills span {
      display: inline-block;
      background: #eee;
      padding: 5px 10px;
      margin: 3px;
      border-radius: 4px;
      font-size: 14px;
    }

    #loading {
      font-size: 18px;
    }
  </style>
</head>

<body>

<div id="loading">Loading resume...</div>
<div id="content"></div>

<script>
const API = "https://ihxkbdrihk.execute-api.us-east-1.amazonaws.com/Prod/resume";

async function loadResume() {
  try {
    const res = await fetch(API);
    const data = await res.json();

    const meta = data.meta || {};
    const exp = data.experience || {};
    const edu = data.education || {};
    const skills = data.skills || {};
    const projects = data.projects || {};
    const certs = data.certifications || {};

    const jobs = exp.jobs || [];
    const projItems = projects.items || [];
    const certItems = certs.items || [];

    document.getElementById("content").innerHTML = `
      <h1>${meta.name || ""}</h1>
      <div class="muted">${meta.title || ""}</div>
      <div class="muted">${meta.location || ""}</div>
      <div class="muted">${meta.email || ""} | ${meta.phone || ""}</div>

      <div class="section">
        <h2>Experience</h2>
        ${jobs.map(j => `
          <div class="item">
            <div class="title">${j.role} - ${j.company}</div>
            <div class="muted">${j.dates}</div>
            <ul>
              ${(j.highlights || []).map(h => `<li>${h}</li>`).join("")}
            </ul>
          </div>
        `).join("")}
      </div>

      <div class="section">
        <h2>Projects</h2>
        ${projItems.map(p => `
          <div class="item">
            <div class="title">${p.name}</div>
            <ul>
              ${(p.highlights || []).map(h => `<li>${h}</li>`).join("")}
            </ul>
          </div>
        `).join("")}
      </div>

      <div class="section">
        <h2>Skills</h2>
        <div class="skills">
          ${(skills.languages || []).map(s => `<span>${s}</span>`).join("")}
          ${(skills.tools || []).map(s => `<span>${s}</span>`).join("")}
          ${(skills.concepts || []).map(s => `<span>${s}</span>`).join("")}
          ${(skills.cloud || []).map(s => `<span>${s}</span>`).join("")}
        </div>
      </div>

      <div class="section">
        <h2>Education</h2>
        <div class="item">
          <div class="title">${edu.school || ""}</div>
          <div class="muted">${edu.degree || ""}</div>
          <div class="muted">Expected ${edu.expected || ""}</div>
        </div>
      </div>

      <div class="section">
        <h2>Certifications</h2>
        <ul>
          ${certItems.map(c => `<li>${c}</li>`).join("")}
        </ul>
      </div>
    `;

    document.getElementById("loading").style.display = "none";

  } catch (err) {
    document.getElementById("loading").innerText = "Error loading resume.";
    console.error(err);
  }
}

loadResume();
</script>

</body>
</html>

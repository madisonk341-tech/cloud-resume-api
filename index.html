<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Madison Kennedy Resume</title>
  <style>
:root {
  --accent: #2563eb;
}

body {
  font-family: Arial, sans-serif;
  margin: 50px auto;
  max-width: 750px;
  line-height: 1.6;
  background: #fafafa;
  color: #222;
}

ul {
  margin-top: 8px;
  padding-left: 20px;
}

h1 {
  font-size: 32px;
  margin-bottom: 5px;
  color: var(--accent);
}

h2 {
  font-size: 18px;
  margin-top: 40px;
  border-bottom: 2px solid var(--accent);
  padding-bottom: 6px;
}

.muted {
  color: #666;
  font-size: 14px;
}

.item {
  background: white;
  padding: 18px;
  border-radius: 6px;
  margin-bottom: 20px;
  border: 1px solid #e5e7eb;
  transition: all 0.2s ease;
}

.item:hover {
  border-color: var(--accent);
}

.skills span {
  display: inline-block;
  background: #e0ecff;
  color: #1e3a8a;
  padding: 6px 10px;
  margin: 4px;
  border-radius: 5px;
  transition: 0.2s;
  font-size: 13px;
}

.skills span:hover {
  background: #ddd;
}

.section {
  margin-top: 40px;
}

.section h2 {
  margin-bottom: 15px;
}

.header {
  margin-bottom: 40px;
}

.title {
  font-weight: bold;
  margin-bottom: 2px;
  color: var(--accent);
}

.company {
  color: #444;
  font-size: 14px;
  margin-bottom: 4px;
}

.dates {
  font-size: 13px;
  color: #777;
  margin-bottom: 8px;
}
</style>
</head>

<body>

<div id="loading">Loading resume...</div>
<div id="content"></div>

<script>
const API = "https://ihxkbdrihk.execute-api.us-east-1.amazonaws.com/Prod/resume";

async function loadResume() {
  try {
    const res = await fetch(API);
    const data = await res.json();

    const meta = data.meta || {};
    const exp = data.experience || {};
    const edu = data.education || {};
    const skills = data.skills || {};
    const projects = data.projects || {};
    const certs = data.certifications || {};

    const jobs = exp.jobs || [];
    const projItems = projects.items || [];
    const certItems = certs.items || [];

    document.getElementById("content").innerHTML = `
      <div class="header">
  <h1>${meta.name || ""}</h1>
  <div class="title">${meta.title || ""}</div>
  <div class="muted">${meta.location || ""}</div>
  <div class="muted">${meta.email || ""} | ${meta.phone || ""}</div>
</div>

      <div class="section">
        <h2>Experience</h2>
        ${jobs.map(j => `
          <div class="item">
            <<div class="title">${j.role}</div>
            <div class="company">${j.company}</div>
            <div class="dates">${j.dates}</div>
            <ul>
              ${(j.highlights || []).map(h => `<li>${h}</li>`).join("")}
            </ul>
          </div>
        `).join("")}
      </div>

      <div class="section">
        <h2>Projects</h2>
        ${projItems.map(p => `
          <div class="item">
            <div class="title">${p.name}</div>
            <ul>
              ${(p.highlights || []).map(h => `<li>${h}</li>`).join("")}
            </ul>
          </div>
        `).join("")}
      </div>

      <div class="section">
        <h2>Skills</h2>
        <div class="skills">
          ${(skills.languages || []).map(s => `<span>${s}</span>`).join("")}
          ${(skills.tools || []).map(s => `<span>${s}</span>`).join("")}
          ${(skills.concepts || []).map(s => `<span>${s}</span>`).join("")}
          ${(skills.cloud || []).map(s => `<span>${s}</span>`).join("")}
        </div>
      </div>

      <div class="section">
        <h2>Education</h2>
        <div class="item">
          <div class="title">${edu.school || ""}</div>
          <div class="muted">${edu.degree || ""}</div>
          <div class="muted">Expected ${edu.expected || ""}</div>
        </div>
      </div>

      <div class="section">
        <h2>Certifications</h2>
        <ul>
          ${certItems.map(c => `<li>${c}</li>`).join("")}
        </ul>
      </div>
    `;

    document.getElementById("loading").style.display = "none";

  } catch (err) {
    document.getElementById("loading").innerText = "Error loading resume.";
    console.error(err);
  }
}

loadResume();
</script>

</body>
</html>
